# Render Blueprint — https://render.com/docs/blueprint-spec
# Set secret values in the Render dashboard (Environment), not in this file.
services:
  - type: web
    name: balaji-inventory-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
